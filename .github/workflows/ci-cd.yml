name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore dependencies
        run: dotnet restore src/WexTransaction/WexTransaction.sln

      - name: Build solution
        run: dotnet build src/WexTransaction/WexTransaction.sln -c Release --no-restore

      - name: Run tests
        run: dotnet test tests/WexTransaction.Tests/ -c Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/test-results.trx'
          check_name: Test Results

  build-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy-staging:
    needs: build-image
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: staging
      url: ${{ secrets.STAGING_URL || 'http://localhost:5000' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        env:
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          STAGING_CONNECTION_STRING: ${{ secrets.STAGING_CONNECTION_STRING }}
        run: |
          echo "Deploying to Staging..."
          echo "STAGING_URL: $STAGING_URL"
          # Add deployment commands here (docker-compose, k8s, cloud deploy, etc.)
          # Example: docker-compose -f docker-compose.staging.yml up -d

      - name: Health Check
        run: |
          STAGING_URL="${{ secrets.STAGING_URL || 'http://localhost:5000' }}"
          for i in {1..30}; do
            if curl -f "$STAGING_URL/health"; then
              echo "Staging deployment healthy"
              exit 0
            fi
            echo "Waiting for staging to be healthy... attempt $i/30"
            sleep 10
          done
          echo "Staging health check failed"
          exit 1

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_env == 'production'
    environment:
      name: production
      url: ${{ secrets.PROD_URL || 'http://localhost:5000' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production
        env:
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_URL: ${{ secrets.PROD_URL }}
          PROD_CONNECTION_STRING: ${{ secrets.PROD_CONNECTION_STRING }}
        run: |
          echo "Deploying to Production..."
          echo "PROD_URL: $PROD_URL"
          # Add deployment commands here (docker-compose, k8s, cloud deploy, etc.)
          # Example: docker-compose -f docker-compose.prod.yml up -d

      - name: Health Check
        run: |
          PROD_URL="${{ secrets.PROD_URL || 'http://localhost:5000' }}"
          for i in {1..30}; do
            if curl -f "$PROD_URL/health"; then
              echo "Production deployment healthy"
              exit 0
            fi
            echo "Waiting for production to be healthy... attempt $i/30"
            sleep 10
          done
          echo "Production health check failed"
          exit 1

      - name: Notify Deployment
        if: success()
        run: |
          echo "✅ Production deployment successful"
          echo "URL: ${{ secrets.PROD_URL }}"
