services:
  postgres:
    image: postgres:15.18-alpine3.23
    container_name: wex-postgres
    environment:
      POSTGRES_DB: WexTransactionDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d WexTransactionDB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

